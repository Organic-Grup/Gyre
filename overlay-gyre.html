
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* Relógio */
#clock {
  position: absolute;
  top: 15px;
  right: 25px;
  font-size: 22px;
  opacity: 0.8;
}

/* Texto rotativo */
#text {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  background: rgba(0,0,0,0.4);
  padding: 8px 20px;
  border-radius: 8px;
}

/* Barra animada */
#bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, #00ffcc, #00ccff, #0066ff);
  animation: slide 6s linear infinite;
}

@keyframes slide {
  0% {transform: translateX(-100%);}
  100% {transform: translateX(100%);}
}

/* Glow leve */
#glow {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,255,200,0.1), transparent);
  animation: pulse 5s infinite;
}

@keyframes pulse {
  0% {opacity: 0.2;}
  50% {opacity: 0.5;}
  100% {opacity: 0.2;}
}

/* Contador fake */
#counter {
  position: absolute;
  top: 15px;
  left: 25px;
  font-size: 18px;
  opacity: 0.8;
}
</style>
</head>
<body>

<div id="glow"></div>
<div id="clock"></div>
<div id="counter">👁️ 0 assistindo</div>
<div id="text">Carregando...</div>
<div id="bar"></div>

<script>
// relógio
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

// textos
const messages = [
  "🔥 AO VIVO 24H",
  "🚀 Fique na live",
  "💬 Interaja no chat",
  "📈 Conteúdo atualizado",
  "⚡ Não perca nada"
];

let i = 0;
function changeText() {
  document.getElementById("text").innerText =
    messages[i];
  i = (i + 1) % messages.length;
}
setInterval(changeText, 4000);

// contador fake dinâmico
let viewers = 50;
function updateViewers() {
  viewers += Math.floor(Math.random() * 10 - 5);
  if (viewers < 10) viewers = 10;
  document.getElementById("counter").innerText =
    "👁️ " + viewers + " assistindo";
}
setInterval(updateViewers, 3000);
</script>

</body>
</html>
